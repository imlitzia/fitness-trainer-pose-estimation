# Preacher Curl Exercise Definition
name: preacher_curl
display_name: "Preacher Curl"
type: repetition
bilateral: true

# Meta bilgiler
target_muscles:
  - Biceps
  - Brachialis
equipment: "Dumbbells on Preacher Bench"
difficulty: intermediate
default_reps: 10
default_sets: 3
rest_time: "60 seconds"
benefits:
  - "Isolates biceps for maximum contraction"
  - "Eliminates momentum and cheating"
  - "Builds peak bicep development"
description: "Preacher curl performed on a slanted bench with dumbbells for strict bicep isolation"

# Çift taraflı ayarlar
sides:
  - left
  - right

# Açı tanımları - her iki taraf için
angles:
  left:
    points: [left_shoulder, left_elbow, left_wrist]
    description: "Sol kol dirsek açısı"
  
  right:
    points: [right_shoulder, right_elbow, right_wrist]
    description: "Sağ kol dirsek açısı"

# Durum makinesi
state_order:
  - down
  - curl
  - flex

states:
  down:
    condition: "angle > 150"
    description: "Kol düz - başlangıç pozisyonu"
  
  curl:
    condition: "angle > 50 and angle <= 150"
    description: "Kaldırma aşaması"
  
  flex:
    condition: "angle <= 50"
    description: "En üst nokta - sayaç artırılır"

# Sayaç kuralı
counter:
  trigger_state: flex
  from_state: curl

# Zaman filtresi
min_rep_duration: 1.0

# Form geri bildirimleri
feedback:
  partial_rep:
    condition: "angle > 60 or angle_min > 60"
    message: "Squeeze more at the top for full contraction!"
    severity: info
  
  elbow_movement:
    condition: "elbow_position_variance > 15"
    message: "Keep your elbows pinned to the pad!"
    severity: warning

# Kalibrasyon
calibration:
  enabled: true
  reps: 2

# Görselleştirme
visualization:
  lines:
    - points: [left_shoulder, left_elbow]
      color: [0, 0, 255]
      thickness: 4
    - points: [left_elbow, left_wrist]
      color: [0, 0, 255]
      thickness: 4
